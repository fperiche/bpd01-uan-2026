  <rect x="410" y="125" width="146" height="88" rx="16" fill="#13243d" stroke="#2dd4bf" stroke-width="2"/>
  <circle cx="436" cy="240" r="9" fill="#22c55e"/>
  <circle cx="474" cy="240" r="9" fill="#f59e0b"/>
