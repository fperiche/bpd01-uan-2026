  <text x="748" y="181" font-family="Inter, Arial" font-size="23" font-weight="800" fill="#0f172a">MQTT</text>
  <text x="743" y="211" font-family="Inter, Arial" font-size="16" fill="#475569">Broker</text>
  <text x="743" y="237" font-family="Inter, Arial" font-size="14" fill="#64748b">topics / QoS</text>
</g>
