  <text x="105" y="222" font-family="Inter, Arial" font-size="16" fill="#475569">Humedad</text>
  <circle cx="235" cy="172" r="28" fill="url(#g1)" opacity=".95"/>
  <path d="M222 172h26M235 159v26" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
</g>
