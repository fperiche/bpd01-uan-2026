<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
<title id="title">Arquitectura IoT de sensor a dashboard</title>
<desc id="desc">Ilustración de un flujo IoT desde sensores y ESP32 hacia broker MQTT, plataforma y dashboard.</desc>
<defs>
  <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#19b5ff"/>
    <stop offset="1" stop-color="#7c3aed"/>
  </linearGradient>
  <linearGradient id="g2" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#0f172a"/>
    <stop offset="1" stop-color="#123a64"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#02111f" flood-opacity=".35"/>
  </filter>
</defs>
<rect width="960" height="620" rx="36" fill="url(#g2)"/>
<circle cx="775" cy="112" r="160" fill="#19b5ff" opacity=".12"/>
<circle cx="180" cy="520" r="210" fill="#7c3aed" opacity=".12"/>
